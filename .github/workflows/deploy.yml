name: Deploy Docs

on:
  push:
    branches: [ "dev" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Docs Repo
      uses: actions/checkout@v4

    - name: Checkout Framework Repo (for dist)
      uses: actions/checkout@v4
      with:
        repository: lumora-css/lumora-css
        path: framework-repo

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Build Docs
      run: |
        mkdir -p build
        node docs-build.js build
        # Copy the framework dist folder into the build directory so docs can reference it
        cp -R framework-repo/dist build/dist

    - name: Deploy to Main Branch
      run: |
        cd build
        git init
        git checkout -b main
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "docs: auto-deploy from dev branch"
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/lumora-css/lumora-css.github.io.git main --force
